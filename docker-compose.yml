services:
  backend:
    image: ghcr.io/sixmon/rclone-replication-webui-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BIND_ADDR: "0.0.0.0:3000"
      RCLONE_BIN: rclone
      APPRISE_BIN: apprise
      RUST_LOG: "info,rclone_replication_ui=debug,sea_orm=warn,sqlx=warn"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./tmp:/mnt/data
    healthcheck:
      test: ["CMD", "rclone-replication-ui", "--health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/sixmon/rclone-replication-webui-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
